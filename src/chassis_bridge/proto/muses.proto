message Result {
    enum ResultState {
        RESPONSE_NONE = 0;
        RESPONSE_PROCESSING = 1; 		// 处理中
        RESPONSE_OK = 2; 				// 成功
        RESPONSE_FAILED = 3; 			// 失败
    }
    ResultState result_state = 1;

    enum ResultCode {
        RESULT_CODE_NONE = 0;
        RESULT_UNDEFINED = 1;                   // 无效命令
        RESULT_INVALID_CMD_PARAM = 2;           // 参数错误
        RESULT_USER_OR_PASSWROD_INVALID = 3;    // 用户名或密码错误

        RESULT_SYSTEM_STATE_ERROR = 4;
        RESULT_OPERATION_MODE_ERROR = 5;
        RESULT_LOAD_MAP_FILE_ERROR = 6;
        RESULT_PRE_TASK_RUNNING = 7;            // 前一个任务还在运行
        RESULT_NAV_NO_WAY = 8;                  // 无法抵达目标位置
        RESULT_NAV_NO_STATION = 9;              // 无法检测到目标站点
        RESULT_NAV_PATH_PLAN_ERROR = 10;        // 路径搜索出错
        RESULT_NAV_PLAN_STEP_ERROR = 11;        // 导航路径生成执行步骤出错
        RESULT_NAV_MOTION_CONTROL_ERROR = 12;   // 导航过程中运控出错：如偏离路径
        RESULT_LOGIN_OK = 13;                   // 登录成功
        RESULT_LOGOUT_OK = 14;                  // 退出成功
        RESULT_MAP_LIST_OK = 15;                // 获取地图成功
        RESULT_IMPORT_MAP_FILE_OK = 16;         // 导入地图成功
        RESULT_SYSTEM_UPDATE_FILE_OK = 17;      // 导入升级文件成功
        RESULT_IMPORT_SATELLITE_LLA_FILE_OK = 18;   //导入零点文件成功
        RESULT_REQUEST_MAPNAME_OK = 19;         // 获取正在使用的地图名称成功
        RESULT_HEARTBEATS_UPDATE_OK = 20;       // 心跳发送成功
        RESULT_ENABLE_MANUAL_CONTROL_OK = 21;   // 使能手动控制成功
        RESULT_ENABLE_AUTO_CONTROL_OK = 22;     // 使能自动控制成功
        RESULT_SET_SPEED_LEVEL_OK = 23;         // 设置速度级别成功
        RESULT_MOVEMENT_TASK_OK = 24;           // 完成MOVMENT TASK
        RESULT_ACTION_TASK_OK = 25;             // 完成ACTION TASK
        RESULT_PAUSE_MOVEMENT_OK = 26;          // 暂停任务成功
        RESULT_CONTINUE_MOVEMENT_OK = 27;       // 继续任务成功
        RESULT_CANCEL_MOVEMENT_TASK_OK = 28;    // 结束任务成功
        RESULT_TRIGGER_EMERGENCY_OK = 29;       // 触发急停成功
        RESULT_CANCEL_EMERGENCY_OK = 30;        // 解除急停成功
        RESULT_ENABLE_AUTO_CHARGE_OK = 31;      // 自动充电指令下发成功
        RESULT_STOP_CHARGE_OK = 32;             // 暂停充电成功
        RESULT_REBOOT_PLNS_OK = 33;             // 重启系统指令下发成功
        RESULT_SYNC_TIME_OK = 34;               // 时间同步成功
        RESULT_CALIBRATION_OK = 35;             // 设置零点成功
        RESULT_CMD_MOWER_OK = 36;               // 割刀升降指令成功
        RESULT_EXTEND_CONTROL_OK = 37;          // 外部IO指令下发成功
        RESULT_FULL_COVERAGE_OK = 38;           // 全覆盖规划路径成功
        RESULT_OPEN_COVERAGEFILE_FAILED  = 39;  // 打开全覆盖点文件失败
        RESULT_WRITE_COVERAGEFILE_FAILED = 40;  // 写入全覆盖路径失败
        RESULT_IMU_CONFIGURATION_OK      = 41;  // 配置IMU参数成功
        RESULT_UPDATE_VCU_OK             = 42;  // 升级VCU固件成功
        RESULT_COVERAGE_FILE_POINT_ERROR = 43;  // 全覆盖边界点异常
        RESULT_COVERAGE_OBST_POINT_ERROR = 44;  // 全覆盖障碍物点异常
        RESULT_NTRIP_PRODUCT_ERROR =       45;  // Ntrip厂家错误
        RESULT_NTRIP_USER_PASSWORD_INVALID = 46; // 用户名或密码不合法
        RESULT_CALIBRATION_FAILED = 47;          // 更新零点失败
        RESULT_LOGIN_EXCEED_MAX_CONNECTION = 48; // APP超过最大连接数量
    }
    ResultCode result_code = 2;
}

// 系统状态，用于上位机登陆时同步，支持多上位机同步操控
message UiState {
    enum ParentState {
        PARENT_STATE_NONE = 0;
        PARENT_STATE_RUNNABLE = 1; // 可运行
        PARENT_STATE_LOCALIZATION = 2; // 定位已启动
        PARENT_STATE_HW_FAULT = 3; // 硬件故障
    }
    ParentState parent_state = 1;

    enum ChildState {
        CHILD_STATE_NONE = 0;
        CHILD_STATE_MANUAL = 1; // 手动模式
        CHILD_STATE_AUTO = 2; // 自动模式
    }
    ChildState child_state = 2;
}
